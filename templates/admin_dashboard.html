<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }
        h2 {
            color: #007BFF;
            margin-bottom: 30px;
            font-size: 26px;
        }
        .link-button {
            display: block;
            width: 100%;
            background-color: #007BFF;
            color: white;
            padding: 14px 20px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .link-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Dashboard</h2>
        <a href="/admin/users" class="link-button">👥 View Registered Users</a>
        <a href="/admin/bookings" class="link-button">📋 View Bookings</a>
        <a href="/admin/feedback" class="link-button">⭐ View Feedback</a>
    </div>
</body>
</html>
